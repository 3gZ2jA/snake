name: Deploy to Vercel on Release

on:
  workflow_dispatch:
  release:
    types: [published, released]

concurrency:
  group: vercel-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease && startsWith(github.event.release.tag_name, 'v')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.release.tag_name }}

      - name: Build and Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"
          RELEASE_TAG="${{ github.event.release.tag_name || github.ref_name }}"
          sed -i "s/__RELEASE_TAG__/${RELEASE_TAG}/g" index.html
          if grep -q "__RELEASE_TAG__" index.html; then
            echo "ERROR: release tag placeholder was not fully replaced"
            exit 1
          fi
          if ! grep -q "const RELEASE_VERSION = '${RELEASE_TAG}';" index.html; then
            echo "ERROR: release version injection verification failed"
            exit 1
          fi
          npx --yes vercel@latest build --prod --token "$VERCEL_TOKEN"
          npx --yes vercel@latest deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN" \
            --meta releaseTag="${{ github.event.release.tag_name || github.ref_name }}" \
            --meta trigger="${{ github.event_name }}"
